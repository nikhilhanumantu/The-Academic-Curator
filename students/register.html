<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col items-center justify-center aurora-bg relative overflow-x-hidden">

<main class="w-full max-w-md px-6 z-10">
<!-- Main Form Card -->
<div class="glass-card rounded-xl p-8 md:p-10 border border-white/40 shadow-[0px_12px_32px_rgba(44,47,49,0.06)]">
<div class="mb-10 text-center">
<h1 class="font-headline text-3xl font-extrabold tracking-tight mb-2 text-on-surface">
                    Create Your Portfolio
                </h1>
<p class="text-on-surface-variant text-sm font-medium">
                    Start your journey as a digital curator today.
                </p>
</div>
<form class="space-y-6" onsubmit="return false;">
<!-- Full Name -->
<div class="relative">
<input class="block w-full px-4 py-4 text-on-surface bg-surface-container-low rounded-xl border-0 focus:ring-2 focus:ring-primary peer transition-all placeholder:opacity-0" id="full_name" name="full_name" placeholder=" " type="text"/>
<label class="absolute text-on-surface-variant font-label text-sm duration-200 transform -translate-y-4 scale-75 top-4 z-10 origin-[0] left-4 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-4" for="full_name">
                        Full Name
                    </label>
</div>
<!-- University Email -->
<div class="relative">
<input class="block w-full px-4 py-4 text-on-surface bg-surface-container-low rounded-xl border-0 focus:ring-2 focus:ring-primary peer transition-all placeholder:opacity-0" id="university_email" name="university_email" placeholder=" " type="email"/>
<label class="absolute text-on-surface-variant font-label text-sm duration-200 transform -translate-y-4 scale-75 top-4 z-10 origin-[0] left-4 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-4" for="university_email">
                        University Email
                    </label>
</div>
<!-- Password -->
<div class="relative">
<input class="block w-full px-4 py-4 text-on-surface bg-surface-container-low rounded-xl border-0 focus:ring-2 focus:ring-primary peer transition-all placeholder:opacity-0" id="password" name="password" placeholder=" " type="password"/>
<label class="absolute text-on-surface-variant font-label text-sm duration-200 transform -translate-y-4 scale-75 top-4 z-10 origin-[0] left-4 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-4" for="password">
                        Password
                    </label>
</div>
<!-- Terms and Privacy -->
<p class="text-[10px] text-on-surface-variant font-label uppercase tracking-widest text-center px-4">
                    By joining, you agree to our <a class="text-primary hover:underline transition-all" href="#">Terms</a> and <a class="text-primary hover:underline transition-all" href="#">Privacy Policy</a>.
                </p>
<!-- Primary Action -->
<button class="aurora-button w-full py-4 rounded-xl text-on-surface font-headline font-bold text-lg shadow-sm hover:opacity-90 active:scale-[0.98] transition-all duration-200" type="submit">
                    Create Student Account
                </button>
</form>
<div class="mt-8 text-center">
<a class="text-on-surface-variant text-sm font-medium hover:text-primary transition-colors" href="#">
                    Already have a profile? <span class="text-primary font-bold">Login here</span>
</a>
</div>
</div>
<!-- Social Proof Footer -->
<div class="mt-8 flex flex-col items-center gap-4">
<div class="flex -space-x-3 overflow-hidden">
<img alt="Student profile" class="inline-block h-8 w-8 rounded-full ring-2 ring-surface" data-alt="portrait of a confident university student smiling in a campus setting with soft sunlight" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA4XLiMo5-5Gbt6htX7bB8c8EOzLX_VACrbszFgogYeQGa-e9FCT4c09p1tcxT7Fuesc7GMsKrTiCFBpoER9hL6eAU6snHDeLnqlDGJjAmnvKqb6uo70P-3otDVz6GMybzIgjXOj7ZdjN5O88dI7XhDhtWnQi0dmRsNJES-PP9bVI8Sm14NOOXpegDuF-KCXM-1AkANrJbxqWhcAYxz-gwVbGz_weM7rg9A_WPaXiSENMwN75KdHtZSUFDhzBbqTzLYsOZqzx4zoTc"/>

<span class="text-[10px] font-bold text-on-secondary-container">+10k</span>
</div>
</div>
<p class="font-label text-xs uppercase tracking-widest text-on-surface-variant font-semibold">
                Joining 10,000+ students
            </p>
</div>
